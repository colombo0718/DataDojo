<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataDojo 資料道場</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='75'>📊</text></svg>">
  <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="main">

    <!-- LEFT: 資料區 -->
    <div id="leftPanel">
      <div id="dataset-bar">
        <select id="dataset-select">
          <option value="iris">🌸 Iris 鳶尾花</option>
          <option value="penguins">🐧 Palmer 企鵝</option>
          <option value="breast_cancer">🔬 乳癌診斷（二元）</option>
        </select>
        <button id="upload-btn" title="上傳自己的 CSV">📂 上傳 CSV</button>
        <input type="file" id="csv-input" accept=".csv" style="display:none">
        <span id="data-count"></span>
      </div>
      <div id="table-wrap">
        <table id="data-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- RIGHT: 工具區 -->
    <div id="rightPanel">

      <!-- Tab 列 -->
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="intro">🏯 平台介紹</button>
        <div class="tab-sep"></div>
        <button class="tab-btn" data-tab="describe">📊 資料描述</button>
        <button class="tab-btn" data-tab="preprocess">🧹 前處理</button>
        <button class="tab-btn" data-tab="train">🤖 訓練 / 測試</button>
        <button class="tab-btn" data-tab="results">💡 結果解讀</button>
        <div class="tab-sep"></div>
        <button class="tab-btn" data-tab="log">📋 操作記錄</button>
      </div>

      <!-- Tab 內容 -->
      <div id="tab-content"></div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
